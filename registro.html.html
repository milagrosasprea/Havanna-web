<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>
    <link rel="stylesheet" href="estilos.css.css">
</head>

<body>

    <!-- HEADER -->
    <header>

        <img src="img/logo.png">

    </header>

    <!-- REGISTRO -->

    <section id="registro-page">

        <h1>Registrarse</h1>

        <!-- NOMBRE -->
        <div class="campo">
            <label>Nombre completo</label>
            <input type="text">
        </div>

        <!-- EMAIL -->
        <div class="campo">
            <label>Email</label>
            <input type="email">
        </div>

        <!-- CONTRASEÑA -->
        <div class="campo">
            <label>Contraseña</label>
            <input type="password">
        </div>

        <!-- REPETIR -->
        <div class="campo">
            <label>Repetir contraseña</label>
            <input type="password">
        </div>

        <!-- BOTONES -->
        <div class="botones-login">

            <button>Crear cuenta</button>

            <a href="index.html.html">
                <button>Volver</button>
            </a>

        </div>

    </section>

</body>

</html>
